# Kessler Art Crochê — nginx
# Front (Next.js) na 3002, API (.NET) na 5002.

server {
    listen 80;
    server_name kessler.178-104-197-138.nip.io;
    return 301 https://kessler.178-104-197-138.nip.io$request_uri;
}

server {
    listen 443 ssl;
    server_name kessler.178-104-197-138.nip.io;

    ssl_certificate /etc/letsencrypt/live/kessler.178-104-197-138.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kessler.178-104-197-138.nip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml image/svg+xml;

    # Uploads de imagem (RequestSizeLimit 10MB nos controllers)
    client_max_body_size 12m;

    # ---- API .NET (porta 5002) ----
    location /api/ {
        proxy_pass http://127.0.0.1:5002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5002/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    location /swagger {
        proxy_pass http://127.0.0.1:5002/swagger;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://127.0.0.1:5002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ---- Next.js (porta 3002) ----
    location /_next/static {
        proxy_pass http://127.0.0.1:3002/_next/static;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
